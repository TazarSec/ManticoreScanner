name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      major: ${{ steps.next.outputs.major }}
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "${latest}" ]; then
            latest="v0.0.0"
          fi
          current=${latest#v}
          IFS='.' read -r major minor patch <<< "${current}"
          case "${BUMP}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "Unknown bump type: ${BUMP}"; exit 1 ;;
          esac
          version="${major}.${minor}.${patch}"
          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "major=${major}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"
          echo "Previous: ${latest} -> New: ${tag}"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          name="manticore-${GOOS}-${GOARCH}${{ matrix.ext }}"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${name}" \
            ./cmd/manticore
          (cd dist && sha256sum "${name}" > "${name}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: manticore-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: dist
        run: |
          set -euo pipefail
          cat ./*.sha256 | sort -k2 > checksums.txt
          rm ./*.sha256
          echo "Release artifacts:"
          ls -la
          echo "Checksums:"
          cat checksums.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create immutable version tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag \
            dist/*

      - name: Update floating major-version tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
          MAJOR_TAG: v${{ needs.version.outputs.major }}
        run: |
          set -euo pipefail
          git tag -f "${MAJOR_TAG}" "${TAG}"
          git push origin "${MAJOR_TAG}" --force